<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SharpManager Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #cba6f7; }

    #status {
      margin-left: auto;
      font-size: 0.8rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }
    #status.connected    { background: #a6e3a1; color: #1e1e2e; }
    #status.disconnected { background: #45475a; color: #cdd6f4; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────────── */
    aside {
      width: 220px;
      min-width: 220px;
      background: #181825;
      border-right: 1px solid #313244;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      margin-top: 10px;
      margin-bottom: 2px;
      padding-left: 4px;
    }

    button {
      width: 100%;
      padding: 7px 12px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #45475a; }
    button:disabled { opacity: 0.4; cursor: default; }

    button.primary {
      background: #7287fd;
      border-color: #7287fd;
      color: #1e1e2e;
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) { background: #8899ff; }

    button.danger {
      background: #f38ba8;
      border-color: #f38ba8;
      color: #1e1e2e;
      font-weight: 600;
    }
    button.danger:hover:not(:disabled) { background: #f5a0b5; }

    button.warning {
      background: #fab387;
      border-color: #fab387;
      color: #1e1e2e;
    }
    button.warning:hover:not(:disabled) { background: #fcc49a; }

    .disk-info {
      font-size: 0.75rem;
      color: #89b4fa;
      padding: 4px 4px;
      word-break: break-all;
      min-height: 1.2em;
    }

    .debug-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      font-size: 0.85rem;
    }
    .debug-row input[type=checkbox] { accent-color: #cba6f7; cursor: pointer; }
    .debug-row label { cursor: pointer; }

    /* ── Log panel ────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px;
      gap: 8px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .log-header span { font-size: 0.8rem; color: #6c7086; }

    #log {
      flex: 1;
      background: #11111b;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.5;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a6e3a1;
    }

    #log .debug { color: #6c7086; }

    #btn-clear-log {
      width: auto;
      padding: 3px 10px;
      font-size: 0.75rem;
      background: #1e1e2e;
      border-color: #45475a;
    }
  </style>
</head>
<body>

<header>
  <h1>SharpManager Web</h1>
  <div id="status" class="disconnected">Disconnected</div>
</header>

<div class="layout">
  <aside>
    <div class="section-label">Connection</div>
    <button id="btn-connect"    class="primary">Connect Arduino</button>
    <button id="btn-disconnect" class="danger"  disabled>Disconnect</button>
    <button id="btn-ping"                       disabled>Ping</button>

    <div class="section-label">Cassette (CE-126P)</div>
    <button id="btn-send-tape" disabled>Send Tape File…</button>
    <button id="btn-recv-tape" disabled>Receive Tape File</button>

    <div class="section-label">Disk Drive (CE-140F)</div>
    <button id="btn-disk-dir"  disabled>Select Disk Folder…</button>
    <div id="lbl-disk-dir" class="disk-info">No folder selected</div>

    <div class="section-label">Operation</div>
    <button id="btn-cancel" class="warning" disabled>Cancel</button>

    <div style="flex:1"></div>

    <div class="debug-row">
      <input type="checkbox" id="chk-debug">
      <label for="chk-debug">Debug messages</label>
    </div>
  </aside>

  <main>
    <div class="log-header">
      <span>Output</span>
      <button id="btn-clear-log">Clear</button>
    </div>
    <div id="log"></div>
  </main>
</div>

<script type="module" src="js/main.js"></script>
<script>
  document.getElementById('btn-clear-log').addEventListener('click', () => {
    document.getElementById('log').textContent = '';
  });
</script>
</body>
</html>
